<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מזל טוב אמא ענבל!</title>
    <style>
        body {
            background-color: #000; /* רקע שחור */
            color: #2eff2e; /* ירוק של Wicked */
            font-family: sans-serif;
            text-align: center;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* כותרת מנצנצת */
        h1 {
            font-size: 50px;
            text-shadow: 0 0 20px #2eff2e;
            margin-top: 20px;
        }

        /* הדמות המרחפת */
        .moving-area {
            position: relative;
            width: 100%;
            height: 400px;
            animation: floatAnimation 3s ease-in-out infinite;
        }

        .mom-photo {
            width: 250px;
            z-index: 2;
            position: relative;
        }

        /* אנימציית ריחוף */
        @keyframes floatAnimation {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* נגן יוטיוב בתחתית */
        .music-box {
            position: fixed;
            bottom: 10px;
            background: rgba(46, 255, 46, 0.2);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #2eff2e;
        }
    </style>
</head>
<body>

    <h1>מזל טוב אמא ענבל! ✨</h1>

    <div class="moving-area">
        <!-- התמונה של אמא - וודא שהשם הוא mom.png -->
        <img src="mom.png" class="mom-photo" onerror="this.alt='תמונה חסרה! וודא שקראת לקובץ mom.png'">
        
        <div style="font-size: 80px; margin-top: -50px;">🧹</div> <!-- מטאטא פשוט -->
        <div style="font-size: 100px; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);">🧙‍♀️</div> <!-- כובע/מכשפה -->
    </div>

    <div class="music-box">
        <p style="margin: 0 0 10px 0; font-weight: bold;">לחצי Play למוזיקה של Wicked:</p>
        <!-- נגן יוטיוב פשוט שיעבוד ב-100% -->
        <iframe width="300" height="60" src="https://www.youtube.com" frameborder="0" allow="autoplay"></iframe>
    </div>

</body>
</html>
