<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מזל טוב ענבל רותם!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0d1b10 0%, #000000 100%);
            color: #2eff2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* כותרת */
        h1 {
            font-size: 3rem;
            text-shadow: 0 0 15px #2eff2e;
            margin-bottom: 20px;
            z-index: 10;
        }

        /* מיכל לדמות המרחפת */
        .witch-container {
            position: relative;
            width: 300px;
            height: 400px;
            animation: float 3s ease-in-out infinite;
        }

        /* התמונה של אמא */
        .mom-img {
            width: 250px;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        /* כובע מכשפה */
        .hat {
            position: absolute;
            width: 150px;
            top: -20px;
            left: 50%;
            transform: translateX(-50%) rotate(-10deg);
            z-index: 3;
            filter: drop-shadow(0 0 10px #2eff2e);
        }

        /* מטאטא */
        .broom {
            position: absolute;
            width: 400px;
            bottom: 20px;
            left: -50px;
            z-index: 1;
            transform: rotate(-5deg);
        }

        /* אנימציית ריחוף */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-40px) rotate(-2deg); }
        }

        /* כפתור הפעלה */
        .play-btn {
            background-color: #2eff2e;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 0 20px #2eff2e;
            transition: 0.3s;
            z-index: 10;
            margin-top: 30px;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background-color: #ffffff;
        }

        /* נגן יוטיוב מוסתר */
        #player {
            display: none;
        }
    </style>
</head>
<body>

    <h1>מזל טוב לאמא ענבל! ✨</h1>

    <div class="witch-container">
        <!-- כובע מכשפה מצויר ב-SVG -->
        <svg class="hat" viewBox="0 0 100 100">
            <path d="M10 80 Q 50 70 90 80 L 50 10 L 10 80" fill="#1a1a1a" />
            <rect x="35" y="65" width="30" height="5" fill="#2eff2e" />
        </svg>
        
        <!-- התמונה שאתה מעלה ל-GitHub -->
        <img src="mom.png" alt="ענבל" class="mom-img">

        <!-- מטאטא מצויר ב-SVG -->
        <svg class="broom" viewBox="0 0 200 50">
            <rect x="0" y="20" width="150" height="5" fill="#4b2c20" />
            <path d="M150 10 Q 180 25 150 40 L 190 45 L 200 25 L 190 5 Z" fill="#d4af37" />
        </svg>
    </div>

    <button class="play-btn" onclick="playMusic()">לחצי כאן להפעלת הקסם 🎶</button>

    <!-- הנגן הנסתר של יוטיוב -->
    <div id="player-container"></div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player-container', {
                height: '0',
                width: '0',
                videoId: 'WTgNu7XHrrU', // ה-ID של Defying Gravity
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // הנגן מוכן
        }

        function playMusic() {
            player.playVideo();
            document.querySelector('.play-btn').innerText = "יום הולדת 43 שמח! 🧹";
        }
    </script>
</body>
</html>
